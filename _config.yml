#
# This file contains configuration flags to customize your site
#

# Name of your site (displayed in the header)
name: "Ronin4n6Labs Research Platform: Advancing Digital & Multimedia Forensics"

# Short bio or description (displayed in the header)
description: Independent (Ronin) Digital & Multimedia Forensic Researcher's Notebook & Thoughts

theme: jekyll-theme-minimal

# Explicitly tell GitHub Pages to use Kramdown (required for MathJax inline math)
markdown: kramdown

# URL of your avatar or profile pic (you could use your GitHub profile pic)
avatar: /images/Ronin.jpg

#
# Flags below are optional
#

# Includes an icon in the footer for each username you enter
footer-links:
  dribbble:
  email: media4n6@gmail.com
  facebook:
  flickr:
  github: ronin4n6labs/Ronin4n6Labs.github.io
  instagram:
  linkedin:
  pinterest:
  rss:
  twitter:
  stackoverflow:
  youtube:
  googleplus:

# Enter your Disqus shortname (not your username) to enable commenting on posts
disqus:

# Enter your Google Analytics web tracking code
google_analytics:

# Your website URL
url: https://Ronin4n6Labs.github.io

# If you're hosting your site at a Project repository on GitHub pages
baseurl: ""

#
# !! You don't need to change any of the configuration flags below !!
#

permalink: /:title/

# The release of Jekyll Now that you're using
version: v1.2.0

# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  input: GFM
  math_engine: mathjax
  math_engine_opts:
    preview: false
  parse_block_html: true
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Set the Sass partials directory
sass:
  style: expanded

# Use the following plug-ins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
